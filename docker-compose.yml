version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: cloudhost-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cloudhost

  redis:
    image: redis:7-alpine
    container_name: cloudhost-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudhost-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/cloudhost
      REDIS_URL: redis://redis:6379
    volumes:
      - backend_uploads:/app/uploads
      - backend_certs:/app/certs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudhost-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: cloudhost-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - frontend
      - backend

volumes:
  mongodb_data:
  redis_data:
  backend_uploads:
  backend_certs:
